<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUET Gaming Club | Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-theme="dark" data-page="signup">
    <div id="site-header"></div>

    <main>
      <section class="page-hero container">
        <h1 class="reveal">Sign Up</h1>
        <p class="reveal">Create your profile to join tournaments, teams, and club announcements.</p>
      </section>

      <section class="section" style="padding-top: 1.2rem;">
        <div class="container auth-shell">
          <form class="form card auth-card reveal" novalidate>
            <h2>Create Account</h2>
            <p>Register once to unlock all KUET Gaming Club programs.</p>
            <div>
              <label for="signup-name">Full Name</label>
              <input class="input" id="signup-name" name="name" type="text" placeholder="Enter your full name" />
            </div>
            <div>
              <label for="signup-email">Email</label>
              <input class="input" id="signup-email" name="email" type="email" placeholder="you@example.com" />
            </div>
            <div>
              <label for="signup-password">Password</label>
              <input class="input" id="signup-password" name="password" type="password" placeholder="Create a password" />
            </div>
            <button class="btn btn-primary neon" type="submit">Sign Up</button>
            <p class="auth-helper">Already have an account? <a href="signin.html">Sign in</a>.</p>
          </form>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
