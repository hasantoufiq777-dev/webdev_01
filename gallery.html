<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUET Gaming Club | Gallery</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-theme="dark" data-page="gallery">
    <div id="site-header"></div>

    <main>
      <section class="page-hero container">
        <h1 class="reveal">Gallery</h1>
        <p class="reveal">Snapshots from tournaments, watch parties, and community events.</p>
      </section>

      <section class="section">
        <div class="container gallery-grid">
          <figure class="gallery-item reveal"><img src="assets/images/gallery-1.svg" alt="Gaming event photo 1" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-2.svg" alt="Gaming event photo 2" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-3.svg" alt="Gaming event photo 3" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-4.svg" alt="Gaming event photo 4" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-5.svg" alt="Gaming event photo 5" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-6.svg" alt="Gaming event photo 6" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-7.svg" alt="Gaming event photo 7" /></figure>
          <figure class="gallery-item reveal"><img src="assets/images/gallery-8.svg" alt="Gaming event photo 8" /></figure>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
